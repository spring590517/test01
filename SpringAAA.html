<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圖書資料管理人員 職業介紹</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;700&display=swap');
:root{--gold:#c9a84c;--deep:#3d2b1f;--sub-bg:rgba(15,8,3,0.82)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0e07;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Noto Sans TC',sans-serif}
.stage{position:relative;width:960px;height:540px;max-width:100vw;overflow:hidden;border-radius:10px;box-shadow:0 30px 100px rgba(0,0,0,.9)}
.scene{position:absolute;inset:0;z-index:2;opacity:0;transition:opacity .7s ease}
.scene.active{opacity:1}
.char-strip{position:absolute;right:0;top:0;width:52%;height:100%;z-index:5;pointer-events:none;overflow:hidden}
.char-img{width:100%;height:100%;object-fit:cover;object-position:left top;opacity:0;transition:opacity .8s}
.char-img.visible{opacity:1}
.char-blend{position:absolute;left:0;top:0;width:55%;height:100%;background:linear-gradient(90deg,rgba(0,0,0,0) 0%,transparent 100%);pointer-events:none;z-index:2}
.top-bar{position:absolute;top:0;left:0;right:0;height:56px;background:linear-gradient(180deg,rgba(0,0,0,.75) 0%,transparent);z-index:20;display:flex;align-items:center;padding:0 22px;gap:12px}
.badge{background:var(--gold);color:var(--deep);font-family:'Noto Serif TC',serif;font-weight:900;font-size:12px;padding:4px 13px;border-radius:2px;letter-spacing:2px}
.src{color:rgba(255,255,255,.5);font-size:11px;letter-spacing:1px}
.ts{position:absolute;top:16px;right:20px;color:rgba(255,255,255,.45);font-size:12px;letter-spacing:2px}
.tbar{position:absolute;top:0;left:0;height:3px;background:var(--gold);z-index:30;width:0}
.scene-label{position:absolute;top:64px;left:22px;z-index:22;opacity:0;transform:translateX(-14px);transition:opacity .4s,transform .4s}
.scene-label.vis{opacity:1;transform:translateX(0)}
.scene-label-inner{background:rgba(20,10,4,.82);backdrop-filter:blur(10px);border-left:3px solid var(--gold);padding:9px 16px;border-radius:0 6px 6px 0}
.scene-label-en{color:rgba(255,255,255,.4);font-size:10px;letter-spacing:3px;margin-bottom:3px}
.scene-label-zh{color:var(--gold);font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;letter-spacing:1px}
.chips{position:absolute;left:22px;bottom:118px;z-index:22;display:flex;flex-direction:column;gap:7px}
.chip{background:rgba(20,10,4,.78);backdrop-filter:blur(8px);border:1px solid rgba(201,168,76,.4);color:rgba(255,255,255,.85);font-size:12px;padding:5px 13px;border-radius:20px;letter-spacing:1px;opacity:0;transform:translateY(10px);transition:opacity .35s,transform .35s}
.chip.vis{opacity:1;transform:translateY(0)}
.subbox{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);z-index:25;max-width:820px;width:92%;text-align:center}
.subline{display:inline-block;background:var(--sub-bg);backdrop-filter:blur(10px);color:#fff;font-family:'Noto Serif TC',serif;font-size:21px;font-weight:700;line-height:1.6;padding:7px 22px;border-radius:5px;letter-spacing:1px;opacity:0;transform:translateY(8px);transition:opacity .28s,transform .28s;text-shadow:0 1px 5px rgba(0,0,0,.8);border-bottom:2px solid var(--gold)}
.subline.on{opacity:1;transform:translateY(0)}
.spkrow{position:absolute;bottom:98px;left:50%;transform:translateX(-50%);z-index:25;display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .4s;white-space:nowrap}
.spkrow.vis{opacity:1}
.spkdot{width:8px;height:8px;background:var(--gold);border-radius:50%;animation:pk 1.2s ease-in-out infinite}
@keyframes pk{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}
.spktxt{color:var(--gold);font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:3px;font-weight:700}
.wavewrap{display:flex;gap:3px;align-items:flex-end;height:18px;opacity:0;transition:opacity .3s;margin-left:6px}
.wavewrap.on{opacity:1}
.wb{width:3px;background:var(--gold);border-radius:2px;animation:wba .65s ease-in-out infinite}
.wb:nth-child(1){height:6px;animation-delay:0s}.wb:nth-child(2){height:12px;animation-delay:.1s}.wb:nth-child(3){height:18px;animation-delay:.2s}.wb:nth-child(4){height:12px;animation-delay:.3s}.wb:nth-child(5){height:6px;animation-delay:.4s}
@keyframes wba{0%,100%{transform:scaleY(.45)}50%{transform:scaleY(1)}}
.pdots{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:25;display:flex;gap:9px;opacity:0;transition:opacity .3s}
.pdots.vis{opacity:1}
.pd{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.35);transition:background .3s,transform .3s}
.pd.on{background:var(--gold);border-color:var(--gold);transform:scale(1.4)}
.povly{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,7,2,.65);backdrop-filter:blur(2px);cursor:pointer;transition:opacity .5s}
.povly.gone{opacity:0;pointer-events:none}
.pbtn{width:82px;height:82px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s;box-shadow:0 0 0 14px rgba(201,168,76,.18),0 0 0 28px rgba(201,168,76,.09)}
.pbtn:hover{transform:scale(1.1)}
.phint{color:rgba(255,255,255,.75);font-family:'Noto Serif TC',serif;font-size:14px;margin-top:22px;letter-spacing:3px}
.endcard{position:absolute;inset:0;z-index:35;background:linear-gradient(135deg,#1e0f06 0%,#3d2110 50%,#2c1508 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .8s}
.endcard.vis{opacity:1;pointer-events:all}
.etitle{font-family:'Noto Serif TC',serif;font-size:34px;font-weight:900;color:var(--gold);letter-spacing:6px;margin-bottom:8px;text-shadow:0 2px 22px rgba(201,168,76,.45)}
.esub{color:rgba(255,255,255,.45);font-size:12px;letter-spacing:5px;margin-bottom:34px}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:560px;width:90%;margin-bottom:32px}
.eitem{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.28);border-radius:7px;padding:13px 16px}
.eititle{color:var(--gold);font-family:'Noto Serif TC',serif;font-size:12px;letter-spacing:2px;margin-bottom:5px;font-weight:700}
.eicontent{color:rgba(255,255,255,.7);font-size:12px;line-height:1.85}
.rbtn{background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:4px;padding:10px 30px;cursor:pointer;border-radius:3px;transition:background .2s,color .2s}
.rbtn:hover{background:var(--gold);color:var(--deep)}
.ctrls{position:absolute;bottom:6px;right:14px;z-index:30;display:flex;gap:7px;opacity:.45;transition:opacity .2s}
.ctrls:hover{opacity:1}
.cbtn{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.7);font-size:11px;padding:4px 10px;cursor:pointer;border-radius:3px;font-family:'Noto Sans TC',sans-serif;letter-spacing:1px;transition:background .15s}
.cbtn:hover{background:rgba(201,168,76,.3)}
.ptcl{position:absolute;border-radius:50%;opacity:0;animation:fup linear infinite}
@keyframes fup{0%{opacity:0;transform:translateY(0) scale(0)}10%{opacity:.5}85%{opacity:.15}100%{opacity:0;transform:translateY(-150px) scale(0)}}
</style>
</head>

    <div class="eitem"><div class="eititle">🏛 工作場所</div><div class="eicontent">公共・學校・大學圖書館<br>企業資料中心・檔案館</div></div>

  </div>

<script>
const lines = [
  "大家好，我是一名圖書資料管理人員！",
  "我們負責圖書的採訪、分類與編目，",
  "讓每一本書都能在對的位置，等待對的讀者。",
  "除了管理館藏，我們也提供參考諮詢服務，",
  "協助讀者找到所需資訊，推廣資訊素養。",
  "喜歡知識、熱愛服務？歡迎加入我們的行列！",
];

const scenes = [
  { en:"INTRODUCTION",    zh:"認識這份職業",    chips:["📚 圖書館學","🎓 專業人員","🏛 知識的守護者"] },
  { en:"CATALOGING",      zh:"採訪・分類・編目", chips:["📋 採訪作業","🔢 中國圖書分類法","💻 MARC 格式"] },
  { en:"COLLECTION MGT",  zh:"書在對的位置",    chips:["📖 索書號","📍 館藏位置","🔍 書目查詢"] },
  { en:"CIRCULATION SYS", zh:"館藏流通管理",    chips:["🖥 ILS 系統","📊 館藏統計","⏰ 借還期管理"] },
  { en:"READER SERVICES", zh:"讀者諮詢服務",    chips:["💬 參考諮詢","🔎 資訊檢索","📡 資訊素養推廣"] },
  { en:"JOIN US",         zh:"職涯邀請",        chips:["🎓 相關學系","💼 多元職場","🌟 終身學習推手"] },
];

const synth = window.speechSynthesis;
let playing = false, currentLineIdx = -1, shownLine = -1;
let lineStartTimes = [], animFrame = null;

function getZhVoice() {
  const vs = synth.getVoices();
  return vs.find(v=>v.lang==='zh-TW') || vs.find(v=>v.lang==='zh-CN') || vs.find(v=>v.lang.startsWith('zh')) || null;
}

function switchScene(idx) {
  document.querySelectorAll('.scene').forEach((s,i)=>s.classList.toggle('active',i===idx));
  const sd = scenes[idx];
  document.getElementById('slEn').textContent = sd.en;
  document.getElementById('slZh').textContent = sd.zh;
  const lbl = document.getElementById('sceneLabel');
  lbl.classList.remove('vis');
  setTimeout(()=>lbl.classList.add('vis'), 80);
  const ch = document.getElementById('chips');
  ch.innerHTML = '';
  sd.chips.forEach((c,i)=>{
    const el = document.createElement('div');
    el.className = 'chip';
    el.textContent = c;
    ch.appendChild(el);
    setTimeout(()=>el.classList.add('vis'), 200+i*150);
  });
}

function showSub(idx) {
  if (shownLine===idx) return;
  shownLine = idx;
  const el = document.getElementById('sub');
  el.classList.remove('on');
  setTimeout(()=>{ el.textContent = lines[idx]; el.classList.add('on'); }, 80);
  for(let i=0;i<lines.length;i++){
    const d=document.getElementById('pd'+i);
    if(d) d.classList.toggle('on',i===idx);
  }
  switchScene(idx);
}

function speakLine(idx) {
  if (idx >= lines.length || !playing) return;
  const utt = new SpeechSynthesisUtterance(lines[idx]);
  utt.lang = 'zh-TW'; utt.rate = 0.93; utt.pitch = 1.05;
  const v = getZhVoice(); if(v) utt.voice = v;
  utt.onstart = ()=>{
    lineStartTimes[idx] = performance.now();
    currentLineIdx = idx;
    showSub(idx);
    document.getElementById('wave').classList.add('on');
  };
  utt.onend = ()=>{
    document.getElementById('wave').classList.remove('on');
    if (!playing) return;
    if (idx === lines.length-1) setTimeout(()=>{ playing=false; doEnd(); }, 400);
    else speakLine(idx+1);
  };
  utt.onerror = ()=>{
    if (idx < lines.length-1) speakLine(idx+1);
    else { playing=false; doEnd(); }
  };
  synth.speak(utt);
}

function startTimerBar() {
  const tb = document.getElementById('tbar');
  tb.style.transition='none'; tb.style.width='0%'; tb.offsetWidth;
  tb.style.transition='width 32s linear'; tb.style.width='100%';
}

function tickTs() {
  if (!playing) return;
  const idx = Math.max(0,currentLineIdx);
  const le = lineStartTimes[idx] ? (performance.now()-lineStartTimes[idx])/1000 : 0;
  const total = Math.min(30, idx*5+le);
  const rem = Math.max(0, 30-total);
  document.getElementById('ts').textContent = '00:'+String(Math.floor(rem)).padStart(2,'0');
  animFrame = requestAnimationFrame(tickTs);
}

function doEnd() {
  cancelAnimationFrame(animFrame);
  document.getElementById('sub').classList.remove('on');
  document.getElementById('spkrow').classList.remove('vis');
  document.getElementById('wave').classList.remove('on');
  document.getElementById('sceneLabel').classList.remove('vis');
  document.getElementById('chips').innerHTML='';
  document.getElementById('ts').textContent='00:00';
  document.getElementById('endcard').classList.add('vis');
}

function startVideo() {
  document.getElementById('povly').classList.add('gone');
  document.getElementById('charImg').classList.add('visible');
  document.getElementById('spkrow').classList.add('vis');
  document.getElementById('pdots').classList.add('vis');
  playing=true; currentLineIdx=0; lineStartTimes=[];
  startTimerBar();
  animFrame = requestAnimationFrame(tickTs);
  const go = ()=>speakLine(0);
  if (!synth.getVoices().length) { synth.onvoiceschanged=()=>{ synth.onvoiceschanged=null; go(); }; }
  else go();
}

function togglePlay() {
  const btn = document.getElementById('ppbtn');
  if (playing) {
    playing=false; synth.pause(); cancelAnimationFrame(animFrame);
    btn.textContent='▶ 播放';
    document.getElementById('wave').classList.remove('on');
    const tb=document.getElementById('tbar');
    const w=parseFloat(getComputedStyle(tb).width);
    const sw=document.getElementById('stage').offsetWidth;
    tb.style.transition='none'; tb.style.width=(w/sw*100).toFixed(1)+'%';
  } else {
    if (currentLineIdx>=lines.length) return;
    playing=true; btn.textContent='⏸ 暫停';
    synth.resume(); animFrame=requestAnimationFrame(tickTs);
  }
}

function resetAndPlay() {
  synth.cancel(); cancelAnimationFrame(animFrame);
  playing=false; currentLineIdx=-1; shownLine=-1; lineStartTimes=[];
  const tb=document.getElementById('tbar');
  tb.style.transition='none'; tb.style.width='0%';
  document.getElementById('endcard').classList.remove('vis');
  document.getElementById('sub').classList.remove('on');
  document.getElementById('sub').textContent='　';
  document.getElementById('spkrow').classList.remove('vis');
  document.getElementById('pdots').classList.remove('vis');
  document.getElementById('wave').classList.remove('on');
  document.getElementById('sceneLabel').classList.remove('vis');
  document.getElementById('chips').innerHTML='';
  document.getElementById('ppbtn').textContent='⏸ 暫停';
  document.getElementById('ts').textContent='00:30';
  document.getElementById('charImg').classList.remove('visible');
  for(let i=0;i<6;i++){const d=document.getElementById('pd'+i);if(d)d.classList.toggle('on',i===0);}
  document.querySelectorAll('.scene').forEach((s,i)=>s.classList.toggle('active',i===0));
  document.getElementById('povly').classList.remove('gone');
}
</script>
