<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>履歷自傳性格解析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

/* ── PRINT / PDF STYLES ── */
@media print {
  @page { size: A4; margin: 14mm 14mm 14mm 14mm; }
  body { background: white !important; }
  .app-shell, .no-print { display: none !important; }
  .print-area { display: block !important; }
  .report-page { box-shadow: none !important; border: none !important; padding: 0 !important; margin: 0 !important; }
  .pdf-page-break { page-break-before: always; }
}

:root {
  --ink: #1a1a2e;
  --ink-light: #4a4a6a;
  --paper: #faf8f4;
  --rule: #e8e4dc;
  --accent: #c0392b;
  --accent-soft: #f9e8e7;
  --gold: #b8860b;
  --gold-soft: #fdf8ec;
  --green: #1a7a4a;
  --green-soft: #e8f5ee;
  --amber: #d4700a;
  --amber-soft: #fef3e2;
  --gray-soft: #f0eee9;
  --blue: #1a4a8a;
  --blue-soft: #eaf0fb;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f0ede8;
  color: var(--ink);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  line-height: 1.7;
  min-height: 100vh;
}

/* ══════════════════════════════
   APP SHELL (input area)
══════════════════════════════ */
.app-shell {
  max-width: 860px;
  margin: 0 auto;
  padding: 28px 20px 0;
}

.app-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 28px;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 14px;
}

.app-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--ink);
}

.app-subtitle {
  font-size: 12px;
  letter-spacing: 0.02em;
  color: var(--ink-light);
  line-height: 1.5;
}

.app-header {
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
}

.step-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.step-block { }
.step-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.step-label::before {
  content: '';
  display: inline-block;
  width: 18px;
  height: 2px;
  background: var(--accent);
}

textarea {
  width: 100%;
  border: 1.5px solid var(--rule);
  border-radius: 4px;
  background: white;
  padding: 12px 14px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12.5px;
  line-height: 1.7;
  color: var(--ink);
  resize: vertical;
  min-height: 160px;
  outline: none;
  transition: border-color 0.2s;
}
textarea:focus { border-color: var(--ink); }
textarea::placeholder { color: #bbb; }
.sample-btn {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 6px; padding: 4px 12px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
  color: var(--accent); background: white;
  border: 1.5px solid var(--accent); border-radius: 20px;
  cursor: pointer; transition: background 0.15s, color 0.15s;
}
.sample-btn:hover { background: var(--accent); color: white; }

.action-row {
  display: flex;
  justify-content: center;
  margin: 20px 0 28px;
}

.btn-analyze {
  background: var(--ink);
  color: white;
  border: none;
  padding: 13px 40px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.15em;
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.2s, transform 0.1s;
}
.btn-analyze:hover { background: #2a2a4e; transform: translateY(-1px); }
.btn-analyze:disabled { background: #aaa; cursor: not-allowed; transform: none; }

.loading-bar {
  display: none;
  text-align: center;
  padding: 16px;
  color: var(--ink-light);
  font-size: 12px;
  letter-spacing: 0.1em;
}
.loading-bar.active { display: block; }
.loading-dots::after {
  content: '';
  animation: dots 1.5s infinite;
}
@keyframes dots {
  0%   { content: ''; }
  33%  { content: '．'; }
  66%  { content: '．．'; }
  100% { content: '．．．'; }
}

/* ══════════════════════════════
   REPORT TOOLBAR
══════════════════════════════ */
.report-toolbar {
  display: none;
  max-width: 860px;
  margin: 0 auto;
  padding: 12px 20px;
  background: var(--ink);
  border-radius: 4px 4px 0 0;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.report-toolbar.visible { display: flex; }

.toolbar-label {
  color: rgba(255,255,255,0.7);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.toolbar-btns { display: flex; gap: 10px; }

.btn-tool {
  background: rgba(255,255,255,0.12);
  color: white;
  border: 1px solid rgba(255,255,255,0.25);
  padding: 7px 18px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.08em;
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-tool:hover { background: rgba(255,255,255,0.22); }
.btn-tool svg { width: 14px; height: 14px; fill: white; }

/* ══════════════════════════════
   REPORT AREA
══════════════════════════════ */
.report-wrapper {
  display: none;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px 40px;
}
.report-wrapper.visible { display: block; }

/* printable A4 container */
.report-page {
  background: var(--paper);
  padding: 36px 40px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
}

/* ── HEADER ── */
.rpt-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 2.5px solid var(--ink);
  padding-bottom: 14px;
  margin-bottom: 22px;
}
.rpt-meta-label {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--ink-light);
  text-transform: uppercase;
  font-weight: 600;
}
.rpt-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.04em;
  line-height: 1.2;
  margin-top: 3px;
}
.rpt-jobtitle {
  font-size: 12.5px;
  color: var(--ink-light);
  margin-top: 4px;
}
.rpt-meta-row {
  font-size: 11px;
  color: var(--ink-light);
  margin-top: 6px;
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}
.verdict-pill {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 6px 16px;
  border-radius: 3px;
  white-space: nowrap;
  margin-top: 4px;
  text-align: center;
}
.verdict-high   { background: var(--green); color: white; }
.verdict-mid    { background: var(--amber); color: white; }
.verdict-low    { background: var(--accent); color: white; }

/* ── SECTION TITLE ── */
.sec-title {
  font-size: 10px;
  letter-spacing: 0.2em;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--accent);
  border-left: 3px solid var(--accent);
  padding-left: 9px;
  margin-bottom: 14px;
  margin-top: 24px;
}

/* ── VERDICT BLOCK ── */
.verdict-block {
  border-radius: 4px;
  padding: 15px 18px;
  margin-bottom: 4px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.verdict-block.amber { background: var(--amber-soft); border: 1.5px solid var(--amber); }
.verdict-block.green { background: var(--green-soft); border: 1.5px solid var(--green); }
.verdict-block.red   { background: var(--accent-soft); border: 1.5px solid var(--accent); }

.verdict-icon { font-size: 24px; line-height: 1; margin-top: 2px; }
.verdict-text { flex: 1; }
.verdict-headline {
  font-family: 'Noto Serif TC', serif;
  font-size: 14.5px;
  font-weight: 700;
  margin-bottom: 5px;
}
.verdict-block.amber .verdict-headline { color: var(--amber); }
.verdict-block.green .verdict-headline { color: var(--green); }
.verdict-block.red   .verdict-headline { color: var(--accent); }
.verdict-desc { font-size: 12.5px; line-height: 1.8; color: var(--ink); }

/* ── SKILL GRID ── */
.skill-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 4px;
}
.skill-card {
  border-radius: 4px;
  padding: 11px 14px;
  border: 1.5px solid transparent;
}
.skill-card.fit-high { background: var(--green-soft); border-color: var(--green); }
.skill-card.fit-mid  { background: var(--gold-soft);  border-color: var(--gold); }
.skill-card.fit-low  { background: var(--accent-soft); border-color: var(--accent); }

.skill-name {
  font-weight: 700;
  font-size: 12.5px;
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
}
.fit-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 2px 9px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.fit-high .fit-tag { background: var(--green); color: white; }
.fit-mid  .fit-tag { background: var(--gold); color: white; }
.fit-low  .fit-tag { background: var(--accent); color: white; }
.skill-note { font-size: 11.5px; color: var(--ink-light); line-height: 1.65; }

/* ── INTERVIEW QUESTIONS ── */
.q-block {
  border: 1px solid var(--rule);
  border-radius: 4px;
  margin-bottom: 10px;
  overflow: hidden;
}
.q-header {
  background: var(--gray-soft);
  padding: 9px 14px;
  display: flex;
  gap: 10px;
  align-items: baseline;
  border-bottom: 1px solid var(--rule);
}
.q-num {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--ink-light);
  white-space: nowrap;
}
.q-text {
  font-weight: 600;
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--ink);
}
.q-body {
  padding: 11px 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.score-col-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--ink-light);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.score-row {
  display: flex;
  gap: 8px;
  margin-bottom: 5px;
  align-items: flex-start;
}
.score-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.dot-1 { background: #fde8e8; color: var(--accent); border: 1.5px solid var(--accent); }
.dot-2 { background: var(--gold-soft); color: var(--gold); border: 1.5px solid var(--gold); }
.dot-3 { background: var(--green-soft); color: var(--green); border: 1.5px solid var(--green); }
.score-desc { font-size: 11.5px; color: var(--ink); line-height: 1.65; }

.focus-tag {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.08em;
  font-weight: 700;
  padding: 2px 9px;
  border-radius: 2px;
  margin-bottom: 7px;
}
.focus-tag.warn { background: var(--accent); color: white; }
.focus-tag.ok   { background: var(--green);  color: white; }
.focus-tag.note { background: var(--ink);    color: white; }

/* ── FOOTER SUMMARY ── */
.summary-footer {
  background: var(--ink);
  color: white;
  border-radius: 4px;
  padding: 18px 22px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
  margin-top: 6px;
}
.footer-col-title {
  font-size: 10px;
  letter-spacing: 0.15em;
  font-weight: 700;
  color: rgba(255,255,255,0.5);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.s-item, .r-item {
  font-size: 12px;
  display: flex;
  gap: 8px;
  margin-bottom: 5px;
  line-height: 1.6;
}
.s-item::before { content: '＋'; color: #5dbb8a; font-weight: 700; flex-shrink: 0; }
.r-item::before { content: '！'; color: #e88080; font-weight: 700; flex-shrink: 0; }

.divider { border: none; border-top: 1px solid var(--rule); margin: 20px 0; }

/* PDF generating overlay */
.pdf-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  color: white;
  font-size: 14px;
  letter-spacing: 0.1em;
}
.pdf-overlay.active { display: flex; }
.pdf-spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── OVERALL SCORE ── */
.score-banner {
  display: flex;
  align-items: center;
  gap: 24px;
  background: white;
  border: 1.5px solid var(--rule);
  border-radius: 4px;
  padding: 18px 22px;
  margin-bottom: 14px;
}
.score-circle-wrap { flex-shrink: 0; text-align: center; }
.score-circle {
  width: 72px; height: 72px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 3px solid;
  margin: 0 auto 4px;
}
.score-circle .sc-num {
  font-family: 'Noto Serif TC', serif;
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
}
.score-circle .sc-denom { font-size: 11px; font-weight: 500; opacity: 0.6; }
.score-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; }

.score-circle.s5 { border-color: var(--green); color: var(--green); }
.score-circle.s4 { border-color: #3a9a5c; color: #3a9a5c; }
.score-circle.s3 { border-color: var(--amber); color: var(--amber); }
.score-circle.s2 { border-color: #c07820; color: #c07820; }
.score-circle.s1 { border-color: var(--accent); color: var(--accent); }
.sl5 { color: var(--green); }
.sl4 { color: #3a9a5c; }
.sl3 { color: var(--amber); }
.sl2 { color: #c07820; }
.sl1 { color: var(--accent); }

.score-stars { display: flex; gap: 4px; margin-top: 6px; }
.score-star { width: 14px; height: 14px; }
.score-star.filled path { fill: currentColor; }
.score-star.empty path { fill: #ddd; }

.score-commentary { flex: 1; }
.commentary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.commentary-block { }
.commentary-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.commentary-label::before {
  content: '';
  width: 10px; height: 2px;
  background: currentColor;
  display: inline-block;
}
.commentary-text {
  font-size: 12px;
  line-height: 1.75;
  color: var(--ink);
}
.advice-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  border-top: 1px solid var(--rule);
  padding-top: 12px;
}
.advice-block { }
.advice-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--blue);
  margin-bottom: 5px;
  text-transform: uppercase;
}
.advice-text {
  font-size: 11.5px;
  line-height: 1.75;
  color: var(--ink);
}


/* ── COMPETENCY GRID ── */
.comp-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 4px;
}
.comp-card {
  border-radius: 4px;
  padding: 11px 14px;
  border: 1.5px solid transparent;
}
.comp-card.fit-high { background: var(--green-soft); border-color: var(--green); }
.comp-card.fit-mid  { background: var(--gold-soft);  border-color: var(--gold); }
.comp-card.fit-low  { background: var(--accent-soft); border-color: var(--accent); }
.comp-name {
  font-weight: 700;
  font-size: 12.5px;
  margin-bottom: 5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
}
.comp-rows { display: flex; flex-direction: column; gap: 3px; }
.comp-row {
  display: flex;
  gap: 6px;
  font-size: 11px;
  line-height: 1.55;
}
.comp-row-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  white-space: nowrap;
  padding-top: 1px;
  opacity: 0.6;
  flex-shrink: 0;
  min-width: 42px;
}
.comp-row-text { color: var(--ink-light); }

/* ── AI WRITING RATIO ── */
.ai-block {
  background: var(--ink);
  color: white;
  border-radius: 4px;
  padding: 16px 20px;
  margin-top: 6px;
}
.ai-top {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 14px;
}
.ai-gauge-wrap { flex-shrink: 0; text-align: center; }
.ai-gauge {
  width: 70px; height: 70px;
  position: relative;
}
.ai-gauge svg { width: 70px; height: 70px; transform: rotate(-90deg); }
.ai-gauge-bg { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 7; }
.ai-gauge-fill { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
.ai-gauge-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.ai-pct {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  font-weight: 700;
  line-height: 1;
  color: white;
}
.ai-pct-sign { font-size: 11px; font-weight: 400; opacity: 0.7; }
.ai-level-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  font-weight: 700;
  margin-top: 4px;
  color: rgba(255,255,255,0.7);
}

.ai-info { flex: 1; }
.ai-title {
  font-size: 10px;
  letter-spacing: 0.18em;
  font-weight: 700;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.ai-signals { }
.ai-signal-item {
  font-size: 11.5px;
  color: rgba(255,255,255,0.85);
  line-height: 1.6;
  display: flex;
  gap: 7px;
  margin-bottom: 4px;
}
.ai-signal-item::before { content: '·'; color: rgba(255,255,255,0.4); font-size: 16px; line-height: 1.2; flex-shrink: 0; }

.ai-note {
  background: rgba(255,255,255,0.08);
  border-left: 3px solid rgba(255,255,255,0.3);
  padding: 8px 12px;
  border-radius: 0 3px 3px 0;
  font-size: 11.5px;
  color: rgba(255,255,255,0.85);
  line-height: 1.65;
}
.ai-note-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.45);
  margin-bottom: 4px;
  text-transform: uppercase;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>

<!-- PDF generating overlay -->
<div class="pdf-overlay" id="pdfOverlay">
  <div class="pdf-spinner"></div>
  <span>正在產生 PDF，請稍候</span>
</div>

<!-- ═══════════ APP SHELL ═══════════ -->
<div class="app-shell" id="appShell">
  <div class="app-header">
    <div class="app-title">履歷自傳性格解析</div>
    <div class="app-subtitle">從履歷自傳解析應徵者的性格，提供用人主管面試問題＆評分建議</div>
  </div>

  <div class="step-grid">

// ═══ SAFE JSON PARSER ═══
function safeParseJSON(raw) {
  // Step 1: strip markdown fences
  let s = raw.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/,'').trim();

  // Step 2: try direct parse
  try { return JSON.parse(s); } catch(e) {}

  // Step 3: extract outermost { ... }
  const start = s.indexOf('{');
  let end = s.lastIndexOf('}');
  if (start === -1) return null;
  if (end === -1) {
    // JSON was truncated — attempt to close open structures
    s = s.slice(start);
    s = repairTruncatedJSON(s);
  } else {
    s = s.slice(start, end + 1);
  }
  try { return JSON.parse(s); } catch(e) {}

  // Step 4: aggressive repair
  s = repairTruncatedJSON(raw.slice(raw.indexOf('{')));
  try { return JSON.parse(s); } catch(e) {
    console.error('JSON repair failed:', e, s.slice(-200));
    return null;
  }
}

function repairTruncatedJSON(s) {
  // Remove trailing incomplete key/value and close open arrays/objects
  // Strip trailing comma, incomplete string, or partial key
  s = s.replace(/,\s*$/, '');
  s = s.replace(/,\s*"[^"]*$/, '');   // partial key at end
  s = s.replace(/"[^"]*$/, '"..."');   // unterminated string → close it

  // Count open braces and brackets
  let braces = 0, brackets = 0, inStr = false, escape = false;
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (escape) { escape = false; continue; }
    if (c === '\\' && inStr) { escape = true; continue; }
    if (c === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (c === '{') braces++;
    else if (c === '}') braces--;
    else if (c === '[') brackets++;
    else if (c === ']') brackets--;
  }
  // Close any open strings first
  if (inStr) s += '"';
  // Close brackets then braces
  for (let i = 0; i < brackets; i++) s += ']';
  for (let i = 0; i < braces; i++) s += '}';
  return s;
}

- 未見佐證（low）：履歷自傳中「完全找不到」任何具體行為事例可佐證此向度。

【佐證的判斷標準 — 嚴格遵守】
- 佐證必須是「具體行為事例（關鍵事件）」，即應徵者做了什麼具體行動、面對什麼具體情境、達成什麼具體結果。
- 嚴格禁止使用應徵者的自我主觀描述或自我評價（如「我是一個有責任感的人」、「我擅長團隊合作」）作為佐證。
- 嚴格禁止使用泛泛的陳述（如「多年工作經驗」、「曾在多家公司任職」）作為佐證。
- 只有具體可驗證的事件、行動或成果才能視為佐證。

【personalities 欄位規則】
- 必須從27項大五人格向度中，選取與該職缺最相關的「6項」關鍵向度。
- 每項都需同時包含性格分析結果與面試題目設計。

【allTraits 欄位規則】
- 必須包含全部27項向度，一項都不能遺漏。
- 這27項分別是：抗壓性、情緒調適、樂觀性、適應性、取悅性、社交性、合作性、互賴性、順從性、循規性、秩序性、謹慎性、負責任、堅毅性、活力、企圖心、表現性、領導性、影響性、直率性、文化開放、冒險性、求變性、思辨性、創造性、同理心、敏覺性。
- 每一項都依照「表現等級定義」嚴格判斷，並提供具體行為事例佐證。

【因素對應】
【情緒穩定】抗壓性、情緒調適、樂觀性、適應性
【親和樂群】取悅性、社交性、合作性、互賴性、順從性
【勤勉審慎】循規性、秩序性、謹慎性、負責任、堅毅性
【外向實踐】活力、企圖心、表現性、領導性、影響性、直率性
【經驗開放】文化開放、冒險性、求變性、思辨性、創造性、同理心、敏覺性

- aiWritingRatio 判斷依據：用語是否過度工整、段落結構是否模板化、是否使用典型AI用語（如「秉持」「致力於」「具備X年以上」格式）、缺乏個人具體細節、情感描述過於完美等。
- aiWritingLevel: 70%以上=極高, 50-69%=偏高, 30-49%=中等, 10-29%=偏低, 10%以下=極低
- 以繁體中文回答
- 所有字串值禁止使用雙引號，改用「」或『』
- 字串中禁止出現換行符號，使用\\n代替
- 只回傳JSON，不要加任何其他文字或markdown

職缺內容：
${job}

應徵者履歷：
${resume}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content.map(i => i.text || '').join('');
    const result = safeParseJSON(raw);
    if (!result) throw new Error('JSON 解析失敗');
    renderReport(result);
  } catch (err) {
    console.error(err);
    alert('解析時發生錯誤，請檢查網路連線後重試。');
    btn.disabled = false;
    loading.classList.remove('active');
  }
}

// ═══ RENDER REPORT ═══
function renderReport(d) {
  const FACTOR_COLOR = {
    '情緒穩定': '#2e7d9e', '親和樂群': '#5a7a2e',
    '勤勉審慎': '#7a5a2e', '外向實踐': '#7a2e2e', '經驗開放': '#4a2e7a'
  };

  const LEVEL_STYLE = {
    high: { bg: '#e8f5ee', border: '#1a7a4a', label: '明顯展現' },
    mid:  { bg: '#fdf8ec', border: '#b8860b', label: '部分可見' },
    low:  { bg: '#f9e8e7', border: '#c0392b', label: '未見佐證' },
  };

  // ── 計算六大關鍵性格符合度分數 ──
  const personalities = d.personalities || [];
  const levelScore = { high: 3, mid: 2, low: 1 };
  const totalScore = personalities.reduce((sum, p) => sum + (levelScore[p.level] || 1), 0);
  const avgScore = personalities.length > 0 ? totalScore / personalities.length : 1;
  // 乘以 5/3 後取小數點一位
  const computedScore = Math.round(avgScore * (5/3) * 10) / 10;
  let scoreLabel, scoreClass, scoreSlClass;
  if (computedScore <= 2) {
    scoreLabel = '不符合'; scoreClass = 's1'; scoreSlClass = 'sl1';
  } else if (computedScore <= 3) {
    scoreLabel = '不太符合'; scoreClass = 's2'; scoreSlClass = 'sl2';
  } else if (computedScore <= 4) {
    scoreLabel = '大致符合'; scoreClass = 's3'; scoreSlClass = 'sl3';
  } else {
    scoreLabel = '非常符合'; scoreClass = 's5'; scoreSlClass = 'sl5';
  }
  // 邀約建議依分數決定
  const verdictLevel = computedScore > 4 ? 'high' : computedScore > 3 ? 'mid' : 'low';
  const verdictClass = verdictLevel === 'high' ? 'green' : verdictLevel === 'low' ? 'red' : 'amber';
  const verdictPillClass = verdictLevel === 'high' ? 'verdict-high' : verdictLevel === 'low' ? 'verdict-low' : 'verdict-mid';
  const verdictIcon = verdictLevel === 'high' ? '🟢' : verdictLevel === 'low' ? '🔴' : '🟡';
  const verdictText = verdictLevel === 'high' ? '✓ 建議邀約' : verdictLevel === 'low' ? '✗ 暫不建議' : '⚠ 部分適配';

  // 星星：以 computedScore 對應 1~5 範圍顯示
  const starCount = Math.round(computedScore);
  const filledStars = Array.from({length:5}, (_,i) => i < starCount
    ? `<svg class="score-star filled" style="color:currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`
    : `<svg class="score-star empty" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`
  ).join('');

  // ── AI Ratio ──
  const aiRatio = d.aiWritingRatio || 0;
  const aiR = 30;
  const aiCircum = 2 * Math.PI * aiR;
  const aiDashOffset = aiCircum - (aiRatio / 100) * aiCircum;
  const aiColor = aiRatio >= 70 ? '#e88080' : aiRatio >= 50 ? '#e8a040' : aiRatio >= 30 ? '#e8d040' : '#5dbb8a';
  const aiSignalsHTML = (d.aiWritingSignals || []).map(s => `<div class="ai-signal-item">${s}</div>`).join('');

  // ── 六大關鍵性格：各向度分數說明 ──
  const scoreBarHTML = personalities.map(p => {
    const s = levelScore[p.level] || 1;
    const scaled = Math.round(s * (5/3) * 10) / 10;
    const fc = FACTOR_COLOR[p.factor] || '#444';
    const barWidth = (s / 3) * 100;
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <span style="font-size:10px;background:${fc};color:white;padding:1px 7px;border-radius:10px;font-weight:600;flex-shrink:0;min-width:52px;text-align:center;">${p.factor}</span>
      <span style="font-size:12px;font-weight:600;min-width:54px;flex-shrink:0;">${p.trait}</span>
      <div style="flex:1;background:#ece9e4;border-radius:3px;height:8px;overflow:hidden;">
        <div style="width:${barWidth}%;background:${fc};height:100%;border-radius:3px;transition:width 0.5s;"></div>
      </div>
      <span style="font-size:11px;font-weight:700;min-width:22px;text-align:right;color:${fc};">${scaled}</span>

    </div>`;
  }).join('');

  // ── 「二、六大關鍵性格」：性格分析 + 面試題合體卡片 ──

    const fc = FACTOR_COLOR[p.factor] || '#444';

    return `

        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:12px;">

        </div>

      <!-- 性格適合度分析 -->

            <div style="font-size:11.5px;color:#1a1a2e;line-height:1.55;">${p.evidence || '未見具體行為佐證'}</div>

      <!-- 面試題目 & 評分標準 -->

        <div style="background:#f7f5f2;border-radius:4px;padding:10px 12px;margin-bottom:10px;">
          <span class="focus-tag ${p.focusType}" style="margin-bottom:6px;display:inline-block;">${p.focusLabel || ''}</span>
          <div style="font-size:12.5px;font-weight:600;color:#1a1a2e;line-height:1.6;">${p.question || ''}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div>
            <div class="score-col-title">評分標準</div>
            <div class="score-row"><div class="score-dot dot-1">1</div><div class="score-desc">${p.score1 || ''}</div></div>
            <div class="score-row"><div class="score-dot dot-2">2</div><div class="score-desc">${p.score2 || ''}</div></div>
            <div class="score-row"><div class="score-dot dot-3">3</div><div class="score-desc">${p.score3 || ''}</div></div>
          </div>
          <div>
            <div class="score-col-title">面試官觀察重點</div>
            <div class="score-desc">${(p.tips || '').replace(/\n/g,'<br>')}</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  // ── Big Five 27 Dimensions Full Table（來自 allTraits）──
  const BIG5_DIMS = [
    { factor: '情緒穩定', color: '#2e7d9e', traits: ['抗壓性','情緒調適','樂觀性','適應性'] },
    { factor: '親和樂群', color: '#5a7a2e', traits: ['取悅性','社交性','合作性','互賴性','順從性'] },
    { factor: '勤勉審慎', color: '#7a5a2e', traits: ['循規性','秩序性','謹慎性','負責任','堅毅性'] },

    { factor: '經驗開放', color: '#4a2e7a', traits: ['文化開放','冒險性','求變性','思辨性','創造性','同理心','敏覺性'] }

  const DEF_MAP = {

      <div>
        <div class="ai-note-label">HR 參考提醒</div>
        <div class="ai-note">${d.aiWritingNote || ''}</div>
      </div>
    </div>
  `;

  document.getElementById('loadingBar').classList.remove('active');
  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('reportToolbar').classList.add('visible');
  document.getElementById('reportWrapper').classList.add('visible');
  document.getElementById('reportWrapper').scrollIntoView({ behavior: 'smooth' });
}

// ═══ EXPORT PDF ═══
async function exportPDF() {
  const overlay = document.getElementById('pdfOverlay');
  overlay.classList.add('active');

  try {
    const { jsPDF } = window.jspdf;
    const element = document.getElementById('reportPage');

    // A4 dimensions in px at 96dpi: 794 x 1123
    const canvas = await html2canvas(element, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#faf8f4',
      width: element.scrollWidth,
      height: element.scrollHeight,
      windowWidth: 794,
    });

    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const pageW = 210;
    const pageH = 297;
    const margin = 10;
    const usableW = pageW - margin * 2;

    const canvasW = canvas.width;
    const canvasH = canvas.height;
    const imgH = (canvasH / canvasW) * usableW;

    let y = margin;
    let remainH = imgH;
    let srcY = 0;

    while (remainH > 0) {
      const sliceH = Math.min(remainH, pageH - margin * 2);
      const srcSliceH = (sliceH / imgH) * canvasH;

      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = canvasW;
      sliceCanvas.height = srcSliceH;
      const ctx = sliceCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, srcY, canvasW, srcSliceH, 0, 0, canvasW, srcSliceH);

      if (srcY > 0) pdf.addPage();
      pdf.addImage(sliceCanvas.toDataURL('image/png'), 'PNG', margin, margin, usableW, sliceH);

      srcY += srcSliceH;
      remainH -= sliceH;
    }

    // filename from candidate name
    const nameEl = document.querySelector('.rpt-name');
    const name = nameEl ? nameEl.textContent.trim() : '候選人';
    const titleEl = document.querySelector('.rpt-jobtitle');
    const title = titleEl ? titleEl.textContent.replace('應徵職位：','').trim() : '職缺';
    pdf.save(`面試決策報告_${name}_${title}.pdf`);

  } catch (err) {
    console.error(err);
    alert('PDF 產生失敗，請改用「列印報告」功能並選擇「另存為 PDF」。');
  } finally {
    overlay.classList.remove('active');
  }
}

  document.getElementById('reportWrapper').classList.remove('visible');
  document.getElementById('reportPage').innerHTML = '';
