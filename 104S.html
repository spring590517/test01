<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職務性格AI解析器 - 第二人生社會企業</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .accent-border-left { border-left: 5px solid #4f46e5; }
        .accent-border-right { border-left: 5px solid #10b981; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <header class="bg-gradient-to-r from-indigo-800 to-blue-700 text-white shadow-xl p-5">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-2">
            <div class="flex items-center space-x-3">
                <i class="fas fa-brain text-3xl text-yellow-400"></i>
                <h1 class="text-2xl md:text-3xl font-bold tracking-tight">職務性格AI解析器</h1>
            </div>
            <div class="text-right">
                <p class="text-sm opacity-90 font-medium">工商心理學專業版 | 27 個性格向度模組</p>
                <p class="text-xs opacity-70">陪伴每個大小朋友安身立命 ‧ 邁向第二人生</p>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            
            <div class="space-y-6">
                <section class="glass-card p-6 rounded-2xl shadow-lg">
                    <h2 class="text-xl font-bold text-indigo-900 mb-5 flex items-center">
                        <i class="fas fa-clipboard-list mr-3 text-indigo-600"></i> 公司與職缺資訊輸入
                    </h2>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2 underline decoration-indigo-300">公司背景資料</label>
                            <textarea id="companyData" rows="3" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="請描述公司願景、組織文化、產業地位..."></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2 underline decoration-indigo-300">職缺工作說明 (JD)</label>
                            <textarea id="jobDescription" rows="6" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="請貼入職位名稱、具體任務與責任、所需技能..."></textarea>
                        </div>
                        <button onclick="runStep1()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl shadow-md transition-transform active:scale-95 flex justify-center items-center gap-2 text-lg">
                            <i class="fas fa-microchip"></i> Step1.解析公司職缺的六大關鍵性格需求
                        </button>
                    </div>
                </section>

                <div id="jobAnalysisResult" class="hidden animate-fade-in">
                    <div class="bg-white p-6 rounded-2xl shadow-xl accent-border-left">
                        <h3 class="text-xl font-bold text-gray-800 mb-4">一、公司職缺關鍵性格向度報告</h3>
                        <div id="jobSummaryContent" class="bg-indigo-50 p-4 rounded-lg text-gray-700 leading-relaxed mb-6"></div>
                        <div id="jobDetailList" class="space-y-4">
                            </div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <section class="glass-card p-6 rounded-2xl shadow-lg">
                    <h2 class="text-xl font-bold text-emerald-900 mb-5 flex items-center">
                        <i class="fas fa-user-edit mr-3 text-emerald-600"></i> 應徵者資料輸入
                    </h2>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2 underline decoration-emerald-300">應徵者履歷自傳全文</label>
                            <textarea id="resumeData" rows="11" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 transition-all" placeholder="請貼入應徵者的學經歷說明、自我介紹或完整自傳內容..."></textarea>
                        </div>
                        <button onclick="runStep2()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl shadow-md transition-transform active:scale-95 flex justify-center items-center gap-2 text-lg">
                            <i class="fas fa-user-check"></i> Step2.分析應徵者履歷自傳的六大性格符合度
                        </button>
                    </div>
                </section>

                <div id="resumeAnalysisResult" class="hidden space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-xl accent-border-right">
                        <h3 class="text-xl font-bold text-gray-800 mb-6 border-b pb-2">二、應徵者性格符合度及面試指南</h3>
                        <div id="resumeDetailList" class="space-y-8">
                            </div>
                    </div>

                    <div class="bg-orange-50 p-6 rounded-2xl border border-orange-200 shadow-lg">
                        <h3 class="text-lg font-bold text-orange-800 mb-4 flex items-center">
                            <i class="fas fa-robot mr-2"></i> 三、履歷 AI 撰寫評估報告
                        </h3>
                        <div id="aiDetectionContent" class="text-gray-700 leading-loose">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 模擬 Step 1 解析邏輯
        function runStep1() {
            const resultDiv = document.getElementById('jobAnalysisResult');
            const summary = document.getElementById('jobSummaryContent');
            const detailList = document.getElementById('jobDetailList');

            resultDiv.classList.remove('hidden');
            summary.innerHTML = `<strong>（一）摘要：</strong> 透過分析公司文化與 JD 資料，本職位核心任務需要面對高度市場不確定性並頻繁進行跨單位溝通，因此應徵者必須具備以下六個關鍵性格向度：<br><span class="font-bold text-indigo-700">1. 抗壓性、2. 社交性、3. 企圖心、4. 影響性、5. 創造性、6. 敏覺性。</span>`;
            
            // 模擬其中一個向度的呈現
            detailList.innerHTML = `
                <div class="p-4 border border-indigo-100 rounded-xl bg-white shadow-sm">
                    <div class="flex items-center text-indigo-700 font-bold mb-1">
                        <span class="bg-indigo-600 text-white w-6 h-6 flex items-center justify-center rounded-full text-xs mr-2">1</span>
                        向度名稱：影響性 (Influence)
                    </div>
                    <p class="text-xs text-gray-500 mb-2 italic">定義：喜歡影響他人行為或想法的傾向。</p>
                    <p class="text-sm text-gray-700"><span class="font-bold">需求理由：</span>職務要求包含「跨部門資源整合」與「外部合作洽談」，若缺乏影響性，將難以在沒有直接行政職權的情況下推動他人配合工作進度。</p>
                </div>
            `;
            window.scrollTo({ top: resultDiv.offsetTop - 50, behavior: 'smooth' });
        }

        // 模擬 Step 2 解析邏輯
        function runStep2() {
            const resultDiv = document.getElementById('resumeAnalysisResult');
            const detailList = document.getElementById('resumeDetailList');
            const aiContent = document.getElementById('aiDetectionContent');

            resultDiv.classList.remove('hidden');
            
            // 模擬其中一個向度的符合度報告
            detailList.innerHTML = `
                <div class="border-b border-gray-100 pb-6">
                    <div class="flex justify-between items-start mb-3">
                        <h4 class="text-lg font-bold text-emerald-800">1. 向度名稱：影響性</h4>
                        <div class="text-right">
                            <span class="text-xs font-bold text-gray-500 block">符合度評分</span>
                            <span class="px-3 py-1 bg-emerald-100 text-emerald-800 rounded-full font-bold text-sm">3. 非常符合</span>
                        </div>
                    </div>
                    <p class="text-sm text-gray-700 bg-emerald-50 p-3 rounded-lg mb-4"><strong>評定依據：</strong>應徵者在自傳中詳述了擔任返鄉服務隊領導人時，如何成功爭取到 10 家在地廠商贊助，並說服 20 位不同背景的隊員達成共識。這充分體現了其具備強大的說服與引導他人的能力。</p>
                    
                    <div class="bg-gray-50 p-4 rounded-xl border border-dashed border-emerald-200">
                        <p class="text-sm font-bold text-gray-800 mb-2 underline">STAR 面試題目與評分標準</p>
                        <p class="text-sm text-gray-600 mb-3 font-medium">「在您的贊助洽談經驗中，若遇到強烈拒絕的人，您具體採取了哪些溝通策略（Action）？最終結果如何（Result）？」</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs">
                            <div class="p-2 bg-white rounded border border-red-100 italic">評定 0~1 (不符合)：回答模糊，或僅表示對方最後剛好同意，未見具體策略。</div>
                            <div class="p-2 bg-white rounded border border-blue-100 italic">評定 2~3 (符合)：能清楚說明如何識別對方需求、調整說詞，並取得實質支持。</div>
                        </div>
                    </div>
                </div>
            `;

            // AI 檢測解析
            aiContent.innerHTML = `
                <div class="space-y-4 text-sm">
                    <div class="flex items-start gap-3">
                        <span class="bg-orange-200 p-1 rounded text-orange-800 font-bold">1</span>
                        <p><strong>困惑度 (Perplexity)：</strong> 文字流暢但用詞極為中性且穩定，缺乏人類敘事中常見的偶發性語法變化或細微情緒波動，顯示機率較高的 AI 生成特徵。</p>
                    </div>
                    <div class="flex items-start gap-3">
                        <span class="bg-orange-200 p-1 rounded text-orange-800 font-bold">2</span>
                        <p><strong>突發性 (Burstiness)：</strong> 句與句之間的長度與節奏過於均勻整齊。人類撰寫自傳通常在描述「困難挑戰」時句式較長，而 AI 則保持恆定頻率。</p>
                    </div>
                    <div class="flex items-start gap-3">
                        <span class="bg-orange-200 p-1 rounded text-orange-800 font-bold">3</span>
                        <p><strong>語義一致性 (Semantic Consistency)：</strong> 內容高度模組化，雖然結構完美但缺乏「具體人名、地名、或特定獨特的感受描述」，這是典型 AI 優化後的特點。</p>
                    </div>
                    <p class="mt-4 p-3 bg-white rounded border-l-4 border-orange-500 font-bold text-orange-700">結論評估：此履歷自傳有約 70% 的機率是透過 AI 工具產出初稿後修改。建議用人主管在面試時，針對「具體細節」進行二次確認。</p>
                </div>
            `;
            window.scrollTo({ top: resultDiv.offsetTop - 50, behavior: 'smooth' });
        }
    </script>
</body>
</html>
